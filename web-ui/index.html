<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MaKarChess Web UI</title>
    <link rel="stylesheet" href="./style.css" />
    <script>
      (function () {
        const reloadKey = "makarchess-sw-cleanup-done";

        async function cleanup() {
          if (!("serviceWorker" in navigator)) {
            return;
          }

          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));

          if ("caches" in window) {
            const cacheKeys = await caches.keys();
            await Promise.all(cacheKeys.map((key) => caches.delete(key)));
          }

          if (!sessionStorage.getItem(reloadKey)) {
            sessionStorage.setItem(reloadKey, "true");
            window.location.reload();
          }
        }

        window.addEventListener("load", () => {
          cleanup().catch(() => {});
        });
      })();
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="control-panel">
        <div class="panel-section panel-header">
          <h1>MaKarChess</h1>
          <p id="connection-status" class="subtle">Checking backend...</p>
        </div>

        <div class="panel-section auth-section">
          <h2>Account</h2>
          <p id="auth-status" class="subtle">Not signed in</p>
          <label>
            <span>Email</span>
            <input id="auth-email-input" type="email" autocomplete="email" placeholder="you@example.com" />
          </label>
          <label>
            <span>Password</span>
            <input id="auth-password-input" type="password" autocomplete="current-password" placeholder="Password" />
          </label>
          <div class="button-row auth-button-row">
            <button id="sign-in-button" type="button">Sign In</button>
            <button id="sign-up-button" type="button" class="secondary-button">Sign Up</button>
          </div>
          <div class="auth-provider-row">
            <button id="google-sign-in-button" type="button" class="secondary-button">Google Sign-In</button>
            <button id="sign-out-button" type="button" class="secondary-button">Sign Out</button>
          </div>
        </div>

        <div class="panel-section button-row">
          <button id="new-game-button">New Game</button>
          <button id="reset-game-button">Reset Game</button>
        </div>

        

        <div class="panel-section move-form">
          <label>
            <span>Import FEN / PGN</span>
            <textarea id="import-input" rows="5" placeholder="FEN: 4k3/8/8/8/8/8/8/4K3 w - - 0 1&#10;PGN: 1. e4 e5 2. Nf3 Nc6"></textarea>
          </label>
          <div class="button-row import-button-row">
            <button id="load-fen-button">Load FEN</button>
            <button id="load-pgn-button">Load PGN</button>
          </div>
        </div>

        <div class="panel-section button-row">
          <button id="replay-back-button">Replay Back</button>
          <button id="replay-forward-button">Replay Forward</button>
        </div>

        <div class="panel-section">
          <h2>Status</h2>
          <dl class="status-grid">
            <div><dt>Side To Move</dt><dd id="side-to-move">-</dd></div>
            <div><dt>Phase</dt><dd id="phase-tag">-</dd></div>
            <div><dt>Winner</dt><dd id="phase-winner">-</dd></div>
            <div><dt>Check</dt><dd id="is-check">-</dd></div>
            <div><dt>Status Line</dt><dd id="status-line">-</dd></div>
            <div><dt>Current Player</dt><dd id="current-player-line">-</dd></div>
            <div><dt>Replay</dt><dd id="replay-status">inactive</dd></div>
            <div><dt>Selected Square</dt><dd id="selected-square">-</dd></div>
          </dl>
        </div>

        <div class="panel-section message-stack">
          <div id="info-message" class="message info">Click New Game to start</div>
          <div id="error-message" class="message error hidden"></div>
        </div>
      </aside>

      <main class="board-panel">
        <div id="board-container" class="board-container"></div>
      </main>
    </div>

    <div id="new-game-modal" class="modal-overlay hidden" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="new-game-modal-title">
        <div class="modal-header">
          <h2 id="new-game-modal-title">Start New Game</h2>
          <button id="close-new-game-modal-button" class="modal-close-button" type="button" aria-label="Close new game dialog">Close</button>
        </div>

        <div class="controls-grid modal-controls-grid">
          <label>
            <span>Bot Type</span>
            <select id="bot-type">
              <option value="">none</option>
              <option value="random">random</option>
              <option value="greedy">greedy</option>
              <option value="defensive">defensive</option>
              <option value="aggressive">aggressive</option>
            </select>
          </label>

          <label>
            <span>Bot Plays</span>
            <select id="bot-plays">
              <option value="">none</option>
              <option value="white">white</option>
              <option value="black">black</option>
            </select>
          </label>

          <label>
            <span>Modeled Side</span>
            <select id="modeled-side">
              <option value="">none</option>
              <option value="white">white</option>
              <option value="black">black</option>
            </select>
          </label>
        </div>

        <div class="modal-actions">
          <button id="cancel-new-game-button" type="button" class="secondary-button">Cancel</button>
          <button id="confirm-new-game-button" type="button">Start Game</button>
        </div>
      </div>
    </div>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
